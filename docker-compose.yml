services:
  postgres:
    image: postgres:16
    container_name: licitaciones-postgres
    environment:
      POSTGRES_DB: licitaciones
      POSTGRES_USER: licitaciones
      POSTGRES_PASSWORD: licitaciones
    ports:
      - "5433:5432"
    volumes:
      - licitaciones_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U licitaciones -d licitaciones"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  licitaciones_data:
