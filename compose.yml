services:
  postgres:
    image: postgres:16
    container_name: tenders-postgres
    environment:
      POSTGRES_DB: tenders
      POSTGRES_USER: tenders
      POSTGRES_PASSWORD: tenders
    ports:
      - "5433:5432"
    volumes:
      - tenders_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenders -d tenders"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tenders_data:
